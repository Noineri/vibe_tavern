services:
  vibe_tavern:
    container_name: vibe_tavern
    image: ghcr.io/noineri/vibe_tavern:latest
    # For mobile access from another device, uncomment and set your host IP:
    # environment:
      # VIBE_TAVERN_EXTERNAL_HOST: 192.168.1.66
    ports:
      - "8787:8787"
    volumes:
      - data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8787/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data:

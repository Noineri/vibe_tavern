<!doctype html>
<html lang="ru" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Vibe Tavern</title>
    <link rel="icon" type="image/png" sizes="256x256" href="/logo-256.png" />
    <link rel="icon" type="image/x-icon" href="/logo.ico" />
    <style>
      /* Pre-React branded splash — a themed static logo shown until the SPA
         bundle parses and mounts. React replaces #root, removing this. The
         padded viewBox + 180px size match <Logo animated> in app.tsx so the
         handoff from static to animated is seamless. */
      :root{
        --bg:oklch(0.184 0.0052 67.5);
        --accent:oklch(0.72 0.14 75);
        --accent-mid:oklch(0.55 0.105 75);
      }
      html,body{height:100%;margin:0;}
      body{background:var(--bg);}
      #vt-splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
      #vt-splash svg{width:180px;height:180px;overflow:visible;}
    </style>
    <script>
      // Theme-aware first paint. Mirrors the loading-placeholder palette table.
      // Source: apps/web/src/themes/*.css — keep in sync.
      (function(){
        var T={
          'coffee':{bg:'oklch(0.184 0.0052 67.5)',accent:'oklch(0.72 0.14 75)',mid:'oklch(0.55 0.105 75)'},
          'light':{bg:'oklch(0.975 0.003 80)',accent:'oklch(0.65 0.14 40)',mid:'oklch(0.55 0.105 40)'},
          'mystic-night':{bg:'oklch(0.14 0.02 288)',accent:'oklch(0.72 0.14 45)',mid:'oklch(0.55 0.105 45)'},
          'light-lava':{bg:'oklch(0.97 0.010 210)',accent:'oklch(0.65 0.22 35)',mid:'oklch(0.55 0.165 35)'}
        };
        var id='coffee';
        try{var s=localStorage.getItem('vibe-tavern.theme');if(s&&T[s])id=s;}catch(e){}
        var p=T[id],r=document.documentElement.style;
        r.setProperty('--bg',p.bg);r.setProperty('--accent',p.accent);r.setProperty('--accent-mid',p.mid);
      })();
    </script>
  </head>

name: CI

on:
  push:
    branches: [master, dev]
    paths-ignore:
      - '**/*.md'
      - '**/*.sh'
      - '**/*.bat'
      - 'assets/**'
      - 'docs/**'
  pull_request:
    branches: [master, dev]
    paths-ignore:
      - '**/*.md'
      - '**/*.sh'
      - '**/*.bat'
      - 'assets/**'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# CI verifies the full platform build matrix on every push/PR — BEFORE a tag is
# ever cut. This replaces the old separate dry-run.yml (deleted).
#
# Gating model:
#   - typecheck is the SOLE gate. If it fails, every downstream build is skipped.
#   - test runs in parallel but is advisory only (continue-on-error) — it never
#     blocks builds and never fails the run.
#   - The 4 platform builds fan out only after typecheck passes.
# Nothing is published; the docker job only loads locally to prove the image builds.
# Build artifacts are intentionally NOT uploaded — CI verifies compilation only,
# not distribution. release.yml re-builds from the tag when cutting a real release;
# uploading throwaway 0.0.0-ci artifacts here only burned Actions storage quota.

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - run: bun run typecheck

  # Advisory only — never gates builds and never fails the run (continue-on-error).
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - run: bun test

  build-linux:
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - run: bun scripts/build-linux-dist.ts

  build-android:
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - run: bun scripts/build-android-arm64.ts
      - name: Stage tarball in Android assets
        run: |
          mkdir -p mobile/android/app/src/main/assets
          cp out/vibe-tavern-android-arm64.tar.gz \
             mobile/android/app/src/main/assets/vibe-tavern-android-arm64.tgz
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: mobile/android

  build-windows:
    needs: [typecheck]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes
      - run: bun scripts/build-installer.ts
        env:
          ISCC_PATH: "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"
      - run: bun scripts/build-windows-dist.ts

  build-docker:
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      # NOTE: NO docker/login-action — we don't push. Only verify the image builds.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: vibe-tavern:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

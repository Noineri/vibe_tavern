name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

# Cancel superseded runs (e.g. force-push or rapid PR updates)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # Fail fast if lockfile is stale (catches "forgot to commit bun.lock")
      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run build

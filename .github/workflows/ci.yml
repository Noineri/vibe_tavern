name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# CI verifies the full platform build matrix on every push/PR — BEFORE a tag is
# ever cut. This replaces the old separate dry-run.yml (deleted).
#
# Gating model:
#   - typecheck is the SOLE gate. If it fails, every downstream build is skipped.
#   - test runs in parallel but is advisory only (continue-on-error) — it never
#     blocks builds and never fails the run.
#   - The 4 platform builds fan out only after typecheck passes.
# Nothing is published; the docker job only loads locally to prove the image builds.

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - run: bun run typecheck

  # Advisory only — never gates builds and never fails the run (continue-on-error).
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - run: bun test

  build-linux:
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set VERSION
        run: echo "VERSION=0.0.0-ci" >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - run: bun scripts/build-linux-dist.ts
      - name: Rename to release name
        run: |
          mv out/vibe-tavern-linux-x64.tar.gz \
             out/Vibe-Tavern-v${VERSION}-linux.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: ci-linux-tarball
          path: out/Vibe-Tavern-v${{ env.VERSION }}-linux.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-android:
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set VERSION
        run: echo "VERSION=0.0.0-ci" >> "$GITHUB_ENV"
      - name: Set Android versionCode/versionName
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          # Strip any suffix like "-rc1" from PATCH for versionCode math
          PATCH_NUM="${PATCH%%-*}"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH_NUM))
          sed -i \
            -e "s/versionCode = .*/versionCode = ${VERSION_CODE}/" \
            -e "s|versionName = \".*\"|versionName = \"${VERSION}\"|" \
            mobile/android/app/build.gradle.kts
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - run: bun scripts/build-android-arm64.ts
      - name: Stage tarball in Android assets
        run: |
          mkdir -p mobile/android/app/src/main/assets
          cp out/vibe-tavern-android-arm64.tar.gz \
             mobile/android/app/src/main/assets/vibe-tavern-android-arm64.tgz
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: mobile/android
      - name: Rename APK
        run: |
          mv mobile/android/app/build/outputs/apk/release/app-release.apk \
             out/Vibe-Tavern-v${VERSION}-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: ci-android-apk
          path: out/Vibe-Tavern-v${{ env.VERSION }}-android.apk
          if-no-files-found: error
          retention-days: 7

  build-windows:
    needs: [typecheck]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set VERSION
        shell: bash
        run: echo "VERSION=0.0.0-ci" >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes
      - run: bun scripts/build-installer.ts
        env:
          ISCC_PATH: "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"
      - run: bun scripts/build-windows-dist.ts
      - name: Rename artifacts
        shell: pwsh
        run: |
          Move-Item out/installer/vibe-tavern-setup.exe `
                     out/Vibe-Tavern-v${{ env.VERSION }}-windows-setup.exe -Force
          Move-Item out/vibe-tavern-windows-x64.zip `
                     out/Vibe-Tavern-v${{ env.VERSION }}-windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: ci-windows-installer
          path: out/Vibe-Tavern-v${{ env.VERSION }}-windows-setup.exe
          if-no-files-found: error
          retention-days: 7
      - uses: actions/upload-artifact@v4
        with:
          name: ci-windows-zip
          path: out/Vibe-Tavern-v${{ env.VERSION }}-windows.zip
          if-no-files-found: error
          retention-days: 7

  build-docker:
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      # NOTE: NO docker/login-action — we don't push. Only verify the image builds.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: vibe-tavern:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Dry-Run Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to bake into artifacts (e.g. 0.4.0-rc1)"
        required: false
        type: string
        default: "0.0.0-dryrun"

permissions:
  contents: read

concurrency:
  group: dryrun-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set VERSION
        run: echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - run: bun scripts/build-linux-dist.ts
      - name: Rename to release name
        run: |
          mv out/vibe-tavern-linux-x64.tar.gz \
             out/Vibe-Tavern-v${VERSION}-linux.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: dryrun-linux-tarball
          path: out/Vibe-Tavern-v${{ env.VERSION }}-linux.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set VERSION
        run: echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
      - name: Set Android versionCode/versionName
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          # Strip any suffix like "-rc1" from PATCH for versionCode math
          PATCH_NUM="${PATCH%%-*}"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH_NUM))
          sed -i \
            -e "s/versionCode = .*/versionCode = ${VERSION_CODE}/" \
            -e "s|versionName = \".*\"|versionName = \"${VERSION}\"|" \
            mobile/android/app/build.gradle.kts
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - run: bun scripts/build-android-arm64.ts
      - name: Stage tarball in Android assets
        run: |
          mkdir -p mobile/android/app/src/main/assets
          cp out/vibe-tavern-android-arm64.tar.gz \
             mobile/android/app/src/main/assets/vibe-tavern-android-arm64.tgz
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: mobile/android
      - name: Rename APK
        run: |
          mv mobile/android/app/build/outputs/apk/release/app-release.apk \
             out/Vibe-Tavern-v${VERSION}-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: dryrun-android-apk
          path: out/Vibe-Tavern-v${{ env.VERSION }}-android.apk
          if-no-files-found: error
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set VERSION
        shell: bash
        run: echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes
      - run: bun scripts/build-installer.ts
        env:
          ISCC_PATH: "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"
      - run: bun scripts/build-windows-dist.ts
      - name: Rename artifacts
        shell: pwsh
        run: |
          Move-Item out/installer/vibe-tavern-setup.exe `
                     out/Vibe-Tavern-v${{ env.VERSION }}-windows-setup.exe -Force
          Move-Item out/vibe-tavern-windows-x64.zip `
                     out/Vibe-Tavern-v${{ env.VERSION }}-windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: dryrun-windows-installer
          path: out/Vibe-Tavern-v${{ env.VERSION }}-windows-setup.exe
          if-no-files-found: error
          retention-days: 7
      - uses: actions/upload-artifact@v4
        with:
          name: dryrun-windows-zip
          path: out/Vibe-Tavern-v${{ env.VERSION }}-windows.zip
          if-no-files-found: error
          retention-days: 7

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set VERSION
        run: echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      # NOTE: NO docker/login-action — we don't push
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true   # load into local docker so we can verify it builds
          tags: vibe-tavern:dryrun
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    needs: [build-linux, build-android, build-windows, build-docker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Set VERSION
        run: echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dryrun-*
          path: artifacts/
          merge-multiple: true
      - name: Build summary table
        run: |
          echo "## Dry-Run Build Summary (v${VERSION})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | Job |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${{ needs.build-linux.result }} | build-linux |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${{ needs.build-android.result }} | build-android |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${{ needs.build-windows.result }} | build-windows |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${{ needs.build-docker.result }} | build-docker |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          (cd artifacts/ && ls -lh && sha256sum *) | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

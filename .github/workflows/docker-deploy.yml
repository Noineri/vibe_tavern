name: Build and Push Docker Image

on:
  # Dev build: every push to main that touches source files
  - push:
      branches:
        - main
        - master
      paths:
        - "Dockerfile"
        - "package.json"
        - "bun.lock"
        - "scripts/**"
        - "services/**"
        - "apps/**"
        - "packages/**"
        - ".github/workflows/docker-deploy.yml"

  # Release build: triggered when release.yml pushes a version tag
  - push:
      tags:
        - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine build mode (dev vs release)
        id: version-check
        run: |
          CURRENT_VERSION=$(jq -r '.version' package.json)
          echo "version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "🚀 Release build triggered by tag"
            echo "is_new_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "🔧 Dev build triggered by push to main"
            echo "is_new_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Dev push: dev + dev-<short-sha>
            type=sha,prefix=dev-,format=short,enable=${{ steps.version-check.outputs.is_new_release == 'false' }}
            type=raw,value=dev,enable=${{ steps.version-check.outputs.is_new_release == 'false' }}
            # Release tag: latest + version tag (e.g. 0.2.0)
            type=semver,pattern={{version}},value=${{ steps.version-check.outputs.version }},enable=${{ steps.version-check.outputs.is_new_release == 'true' }}
            type=raw,value=latest,enable=${{ steps.version-check.outputs.is_new_release == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

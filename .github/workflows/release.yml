name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create source archive
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          VERSION="${{ steps.version.outputs.version }}"
          git archive --format=zip --prefix="${REPO_NAME}/" HEAD -o "${REPO_NAME}-${VERSION}.zip"
          zip -d "${REPO_NAME}-${VERSION}.zip" \
            "${REPO_NAME}/.gitignore" \
            "${REPO_NAME}/.github/*" \
            "${REPO_NAME}/.github/"

      - name: Sync version bump to master
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          find . -name package.json -not -path '*/node_modules/*' | while read pkg; do
            tmp="${pkg}.tmp"
            jq --arg v "$VERSION" '
              .version = $v |
              if .dependencies then
                .dependencies |= (
                  to_entries | map(
                    if .key | startswith("@vibe-tavern/") then .value = $v else . end
                  ) | from_entries
                )
              else . end |
              if .devDependencies then
                .devDependencies |= (
                  to_entries | map(
                    if .key | startswith("@vibe-tavern/") then .value = $v else . end
                  ) | from_entries
                )
              else . end
            ' "$pkg" > "$tmp"
            mv "$tmp" "$pkg"
          done
          git add package.json '**/package.json'
          git diff --cached --quiet && echo "Version already up to date" && exit 0
          git commit -m "chore: release v${VERSION}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.zip"

  build-windows-installer:
    needs: release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set version from release
        shell: bash
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Ensure native frontend bindings
        run: bun add -d @rolldown/binding-win32-x64-msvc@1.0.0-rc.17 lightningcss-win32-x64-msvc@1.32.0 @tailwindcss/oxide-win32-x64-msvc@4.3.0

      - run: choco install innosetup --yes --no-progress

      - run: bun scripts/build-installer.ts
        env:
          ISCC_PATH: "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"

      - name: Rename installer with version
        shell: pwsh
        run: |
          $version = "${{ needs.release.outputs.version }}"
          Rename-Item -Path "out\installer\vibe-tavern-setup.exe" `
                      -NewName "vibe-tavern-${version}-setup.exe"

      - uses: softprops/action-gh-release@v2
        with:
          files: out/installer/vibe-tavern-${{ needs.release.outputs.version }}-setup.exe

  build-android-apk:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Ensure native frontend bindings
        run: bun add -d @rolldown/binding-linux-x64-gnu@1.0.0-rc.17 lightningcss-linux-x64-gnu@1.32.0 @tailwindcss/oxide-linux-x64-gnu@4.3.0

      - run: bun scripts/build-android-arm64.ts

      - name: Copy tarball into Android assets
        run: |
          mkdir -p mobile/android/app/src/main/assets
          cp out/vibe-tavern-android-arm64.tar.gz \
             mobile/android/app/src/main/assets/vibe-tavern-android-arm64.tgz

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease

      - name: Rename APK with version
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          mv mobile/android/app/build/outputs/apk/release/app-release.apk \
             "vibe-tavern-${VERSION}-android.apk"

      - uses: softprops/action-gh-release@v2
        with:
          files: vibe-tavern-${{ needs.release.outputs.version }}-android.apk

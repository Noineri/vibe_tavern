name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Sync version bump to master
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          find . -name package.json -not -path '*/node_modules/*' | while read pkg; do
            tmp="${pkg}.tmp"
            jq --arg v "$VERSION" '
              .version = $v |
              if .dependencies then
                .dependencies |= (
                  to_entries | map(
                    if .key | startswith("@vibe-tavern/") then .value = $v else . end
                  ) | from_entries
                )
              else . end |
              if .devDependencies then
                .devDependencies |= (
                  to_entries | map(
                    if .key | startswith("@vibe-tavern/") then .value = $v else . end
                  ) | from_entries
                )
              else . end
            ' "$pkg" > "$tmp"
            mv "$tmp" "$pkg"
          done
          bun install
          git add package.json '**/package.json' bun.lock
          git diff --cached --quiet && echo "Version already up to date" && exit 0
          git commit -m "chore: release v${VERSION}"
          git pull --rebase origin master
          git push

      - name: Verify version consistency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Checking version consistency for v${VERSION}..."
          ERRORS=0
          for pkg in $(find . -name package.json -not -path '*/node_modules/*'); do
            PKG_VER=$(jq -r '.version' "$pkg")
            if [ "$PKG_VER" != "$VERSION" ]; then
              echo "ERROR: $pkg has version $PKG_VER, expected $VERSION"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ ! -s bun.lock ]; then
            echo "ERROR: bun.lock is missing or empty"
            ERRORS=$((ERRORS + 1))
          fi
          if [ $ERRORS -gt 0 ]; then
            echo "FAILED: $ERRORS version inconsistencies found"
            exit 1
          fi
          echo "OK: All versions consistent"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  build-windows-installer:
    needs: release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set version from release
        shell: bash
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Install platform optional dependencies
        run: bun scripts/install-platform-optionals.ts

      - run: choco install innosetup --yes --no-progress

      - run: bun scripts/build-installer.ts
        env:
          ISCC_PATH: "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"

      - name: Rename installer with version
        shell: pwsh
        run: |
          $version = "${{ needs.release.outputs.version }}"
          Rename-Item -Path "out\installer\vibe-tavern-setup.exe" `
                      -NewName "Vibe-Tavern-${version}-windows-setup.exe"

      - uses: softprops/action-gh-release@v3
        with:
          files: out/installer/Vibe-Tavern-${{ needs.release.outputs.version }}-windows-setup.exe

  build-windows:
    needs: release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set version from release
        shell: bash
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Install platform optional dependencies
        run: bun scripts/install-platform-optionals.ts

      - run: bun scripts/build-windows-dist.ts

      - name: Rename archive with version
        shell: bash
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          mv out/vibe-tavern-windows-x64.zip "Vibe-Tavern-${VERSION}-windows.zip"

      - uses: softprops/action-gh-release@v3
        with:
          files: Vibe-Tavern-${{ needs.release.outputs.version }}-windows.zip

  build-android-apk:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set Android version from release tag
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          sed -i "s/versionCode = [0-9]*/versionCode = $CODE/" mobile/android/app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION\"/" mobile/android/app/build.gradle.kts

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install platform optional dependencies
        run: bun scripts/install-platform-optionals.ts

      - run: bun scripts/build-android-arm64.ts

      - name: Copy tarball into Android assets
        run: |
          mkdir -p mobile/android/app/src/main/assets
          cp out/vibe-tavern-android-arm64.tar.gz \
             mobile/android/app/src/main/assets/vibe-tavern-android-arm64.tgz

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease

      - name: Rename APK with version
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          mv mobile/android/app/build/outputs/apk/release/app-release.apk \
              "Vibe-Tavern-${VERSION}-android.apk"

      - uses: softprops/action-gh-release@v3
        with:
          files: vibe-tavern-${{ needs.release.outputs.version }}-android.apk

  build-linux:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install platform optional dependencies
        run: bun scripts/install-platform-optionals.ts

      - run: bun scripts/build-linux-dist.ts

      - name: Rename archive with version
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          mv out/vibe-tavern-linux-x64.tar.gz "Vibe-Tavern-${VERSION}-linux.tar.gz"

      - uses: softprops/action-gh-release@v3
        with:
          files: Vibe-Tavern-${{ needs.release.outputs.version }}-linux.tar.gz

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master
      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Bump package.json versions
        id: bump
        run: |
          find . -name package.json -not -path '*/node_modules/*' | while read pkg; do
            tmp="${pkg}.tmp"
            jq --arg v "$VERSION" '
              .version = $v |
              if .dependencies then
                .dependencies |= (
                  to_entries | map(
                    if .key | startswith("@vibe-tavern/") then .value = $v else . end
                  ) | from_entries
                )
              else . end |
              if .devDependencies then
                .devDependencies |= (
                  to_entries | map(
                    if .key | startswith("@vibe-tavern/") then .value = $v else . end
                  ) | from_entries
                )
              else . end
            ' "$pkg" > "$tmp"
            mv "$tmp" "$pkg"
          done
          bun install

          if git diff --quiet; then
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "Already at v${VERSION}, skipping bump"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json '**/package.json' bun.lock
          git commit -m "chore: bump to v${VERSION}"
          git push origin master

          NEW_SHA=$(git rev-parse HEAD)
          echo "sha=${NEW_SHA}" >> "$GITHUB_OUTPUT"

          git tag -f "${GITHUB_REF_NAME}" "$NEW_SHA"
          git push -f origin "refs/tags/${GITHUB_REF_NAME}"

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.sha }}
      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - run: bun scripts/build-linux-dist.ts
      - name: Rename to release name
        run: |
          mv out/vibe-tavern-linux-x64.tar.gz \
             out/Vibe-Tavern-v${VERSION}-linux.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-linux-tarball
          path: out/Vibe-Tavern-v${{ env.VERSION }}-linux.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.sha }}
      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Set Android versionCode/versionName
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          sed -i \
            -e "s/versionCode = [0-9]*/versionCode = ${VERSION_CODE}/" \
            -e "s|versionName = \"[^\"]*\"|versionName = \"${VERSION}\"|" \
            mobile/android/app/build.gradle.kts
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - run: bun scripts/build-android-arm64.ts
      - name: Stage tarball in Android assets
        run: |
          mkdir -p mobile/android/app/src/main/assets
          cp out/vibe-tavern-android-arm64.tar.gz \
             mobile/android/app/src/main/assets/vibe-tavern-android-arm64.tgz
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease
      - name: Rename APK
        run: |
          mv mobile/android/app/build/outputs/apk/release/app-release.apk \
             out/Vibe-Tavern-v${VERSION}-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-android-apk
          path: out/Vibe-Tavern-v${{ env.VERSION }}-android.apk
          if-no-files-found: error
          retention-days: 7

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.sha }}
      - name: Set VERSION from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun scripts/install-platform-optionals.ts
      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes
      - run: bun scripts/build-installer.ts
        env:
          ISCC_PATH: "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"
      - run: bun scripts/build-windows-dist.ts
      - name: Rename artifacts
        shell: pwsh
        run: |
          Move-Item out/installer/vibe-tavern-setup.exe `
                     out/Vibe-Tavern-v${{ env.VERSION }}-windows-setup.exe -Force
          Move-Item out/vibe-tavern-windows-x64.zip `
                     out/Vibe-Tavern-v${{ env.VERSION }}-windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-windows-installer
          path: out/Vibe-Tavern-v${{ env.VERSION }}-windows-setup.exe
          if-no-files-found: error
          retention-days: 7
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-windows-zip
          path: out/Vibe-Tavern-v${{ env.VERSION }}-windows.zip
          if-no-files-found: error
          retention-days: 7

  build-docker:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.sha }}
      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    needs: [version, build-linux, build-android, build-windows, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.sha }}
      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          path: release-assets/
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd release-assets/
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          name: v${{ env.VERSION }}

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create source archive
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          VERSION="${{ steps.version.outputs.version }}"
          git archive --format=zip --prefix="${REPO_NAME}/" HEAD -o "${REPO_NAME}-${VERSION}.zip"
          zip -d "${REPO_NAME}-${VERSION}.zip" \
            "${REPO_NAME}/.gitignore" \
            "${REPO_NAME}/.github/*" \
            "${REPO_NAME}/.github/"

      - name: Sync version bump to master
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          find . -name package.json -not -path '*/node_modules/*' | while read pkg; do
            tmp="${pkg}.tmp"
            jq --arg v "$VERSION" '
              .version = $v |
              if .dependencies then
                .dependencies |= (
                  to_entries | map(
                    if .key | startswith("@vibe-tavern/") then .value = $v else . end
                  ) | from_entries
                )
              else . end |
              if .devDependencies then
                .devDependencies |= (
                  to_entries | map(
                    if .key | startswith("@vibe-tavern/") then .value = $v else . end
                  ) | from_entries
                )
              else . end
            ' "$pkg" > "$tmp"
            mv "$tmp" "$pkg"
          done
          git add '**/package.json'
          git diff --cached --quiet && echo "Version already up to date" && exit 0
          git commit -m "chore: release v${VERSION}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.zip"

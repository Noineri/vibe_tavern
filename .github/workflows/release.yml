name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Bump versions in all package.json files
        run: |
          find . -name package.json -not -path '*/node_modules/*' | while read pkg; do
            tmp="${pkg}.tmp"
            jq --arg v "${{ steps.version.outputs.version }}" '
              .version = $v |
              if .dependencies then
                .dependencies |= to_entries | map(
                  if .key | startswith("@vibe-tavern/") then .value = $v else . end
                ) | from_entries
              else . end |
              if .devDependencies then
                .devDependencies |= to_entries | map(
                  if .key | startswith("@vibe-tavern/") then .value = $v else . end
                ) | from_entries
              else . end
            ' "$pkg" > "$tmp"
            mv "$tmp" "$pkg"
          done

      - name: Sync version bump to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '**/package.json'
          git diff --cached --quiet && echo "Version already up to date" && exit 0
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git push

      - name: Create source archive
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          git archive --format=zip --prefix="${REPO_NAME}/" HEAD -o "${REPO_NAME}-${{ steps.version.outputs.version }}.zip"
          zip -d "${REPO_NAME}-${{ steps.version.outputs.version }}.zip" \
            "${REPO_NAME}/.gitignore" \
            "${REPO_NAME}/.github/*" \
            "${REPO_NAME}/.github/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.zip"

  build-windows-installer:
    needs: release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: choco install innosetup --yes --no-progress

      - run: bun scripts/build-installer.ts
        env:
          ISCC_PATH: "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"

      - run: |
          $version = "${{ needs.release.outputs.version }}"
          Rename-Item -Path "installer\output\claw-tavern-setup.exe" `
                      -NewName "claw-tavern-${version}-setup.exe"

      - uses: softprops/action-gh-release@v2
        with:
          files: installer/output/claw-tavern-${{ needs.release.outputs.version }}-setup.exe

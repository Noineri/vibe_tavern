name: Feature request
description: Suggest a new feature
labels: ["enhancement"]
type: "Feature"
title: "[FEATURE] "
body:

    - type: textarea
      attributes:
          label: "What would you like to be added?"
          description: "It can be a suggestion to a new feature, suggestion of UI/UX improvement.. whatever."

    - type: textarea
      attributes:
          label: "How will this help the project and other people?"
          description: "Describe why you think this feature (or change) should be implemented."
